# Benchmark experiment scenarios for performance evaluation
# Run with: python experiments/run_experiments.py --config configs/benchmark_scenarios.yaml

scenarios:
  - scenario_id: "small_earthquake"
    disaster: { type: "earthquake", lat: -7.8, lon: 110.4, name: "small_eq" }
    region: { type: "circle", radius_km: 10.0 }
    execution:
      modes: ["naive", "parallel"]
      workers: [2, 4, 8]

  - scenario_id: "medium_flood"
    disaster: { type: "flood", lat: -6.9, lon: 107.6, name: "bandung_flood" }
    region: { type: "circle", radius_km: 20.0 }
    execution:
      modes: ["naive", "parallel", "hpc"]
      workers: [4, 8, 16]

  - scenario_id: "large_volcano"
    disaster: { type: "volcano", lat: -7.54, lon: 110.44, name: "merapi_large" }
    region: { type: "circle", radius_km: 40.0 }
    execution:
      modes: ["naive", "parallel", "hpc"]
      workers: [8, 16, 32]

base_extraction:
  osm_cache_dir: "data/raw/osm_cache"
  use_cached_osm: true
  inarisk_batch_size: 20

base_routing:
  max_routes_per_village: 3
  weight_distance: 0.25
  weight_risk: 0.45
  weight_road_quality: 0.20
  weight_time: 0.10

output_dir: "output/benchmark"
n_repeats: 3    # repeat each benchmark n times for statistical stability
