# RespondOR-EvacuationRoute — Cianjur Earthquake 2022
# November 21, 2022: M5.6 earthquake at 10 km depth struck Cianjur Regency,
# West Java. More than 600 people were killed and 56,000 homes damaged across
# 16 kecamatan. The shallow focal depth caused intense local shaking; steep
# hillside terrain triggered secondary landslides that blocked escape roads.
# This is a compact mountainous scenario: dense rural settlements, narrow
# mountain roads, and route quality is critical due to slope instability.

scenario_id: "cianjur_earthquake_2022"
output_dir: "output/cianjur_earthquake_2022"
log_level: "INFO"

# ------------------------------------------------------------------ #
# DISASTER INFORMATION
# ------------------------------------------------------------------ #
disaster:
  name: "Cianjur Earthquake 2022"
  type: "earthquake"              # earthquake|volcano|flood|landslide
  lat: -6.84                      # epicentre — north of Cianjur town
  lon: 107.05
  severity: 0.80                  # M5.6 shallow — high intensity, secondary landslides

# ------------------------------------------------------------------ #
# REGION OF INTEREST
# ------------------------------------------------------------------ #
region:
  type: "circle"
  center: [-6.84, 107.05]
  radius_km: 20.0                 # covers worst-affected kecamatan: Cugenang, Pacet, Cianjur

# ------------------------------------------------------------------ #
# DATA EXTRACTION OPTIONS
# ------------------------------------------------------------------ #
extraction:
  use_cached_osm: true
  use_cached_inarisk: true
  network_type: "all"             # include paths — highland villages may only be footpath-accessible

  # West Java: building clusters on steep hillside terrain give accurate
  # population distribution; wilayah DB provides L9 spatial reference.
  village_sources: [building_clusters]
  village_pop_density: 1500.0     # densely populated West Java highlands
  village_max_pop: 30000

  village_cluster_eps_m: 150
  village_cluster_min_buildings: 1
  village_cluster_max_area_km2: 5.0
  village_fill_uncovered_l9: true
  village_persons_per_dwelling: 2.0
  village_building_persons:
    house:       4.0
    detached:    7.0
    semidetached_house: 4.0
    terrace:     4.0
    residential: 10.0
    farm:        7.0
    "yes":       2.0
    mosque:      0.0
    school:      0.0
    hospital:    0.0
    commercial:  0.0

  inarisk_batch_size: 20
  inarisk_rate_limit_s: 1.0

  population_csv: null

  # Schools used extensively in 2022 response (Cugenang, Pacet); government
  # offices and mosques on stable ground. Include sports fields (lapangan).
  shelter_tags:
    amenity:   [hospital, clinic, school, university, community_centre, place_of_worship]
    emergency: [assembly_point, shelter]
    building:  [school, university, civic, government, public, church, mosque]
    leisure:   [sports_centre, stadium, pitch, park]
    landuse:   [military]
  shelter_min_area_m2: 250.0      # include small mountain puskesmas
  shelter_m2_per_person: 2.0
  shelter_capacity_csv: null
  shelter_cluster_eps_m: 250
  shelter_cluster_min_shelters: 1

  road_types:
    primary:       {speed_kmh:  50, capacity_veh_h: 1400}
    secondary:     {speed_kmh:  40, capacity_veh_h: 1000}
    tertiary:      {speed_kmh:  30, capacity_veh_h:  700}
    unclassified:  {speed_kmh:  25, capacity_veh_h:  500}
    residential:   {speed_kmh:  20, capacity_veh_h:  400}
    service:       {speed_kmh:  15, capacity_veh_h:  200}
    living_street: {speed_kmh:  10, capacity_veh_h:  100}
    track:         {speed_kmh:  10, capacity_veh_h:   80}   # critical in Cianjur highlands
    path:          {speed_kmh:   5, capacity_veh_h:   30}
    footway:       {speed_kmh:   4, capacity_veh_h:   20}

# ------------------------------------------------------------------ #
# ROUTING CONFIGURATION
# ------------------------------------------------------------------ #
routing:
  max_routes_per_village: 5
  max_route_risk_threshold: 0.85

  # Earthquake with secondary landslides: road quality and risk are co-dominant
  weight_distance:     0.25
  weight_risk:         0.45
  weight_road_quality: 0.25       # elevated — narrow mountain roads prone to blockage
  weight_time:         0.05

  # Compound hazard layers: Cianjur 2022 combined seismic shaking
  # with secondary landslides triggered on steep hillside terrain.
  hazard_layers:
    earthquake: 0.60                # dominant seismic shaking (M5.6 shallow)
    landslide:  0.40                # secondary slope failures in Cugenang/Pacet hills
  hazard_aggregation: "weighted_sum"

  bpr_alpha: 0.15
  bpr_beta: 4.0
  assignment_method: "greedy"   # greedy (fast) | lp (optimal)

# ------------------------------------------------------------------ #
# EXECUTION MODE
# ------------------------------------------------------------------ #
execution:
  mode: "naive"
  n_workers: 4
