# RespondOR-EvacuationRoute — Jakarta Flood Scenario (Legacy Input Mode)
# Uses pre-extracted PYCGR network + POI CSV from RespondOR v1 (misc/respondor)
# Input source: misc/respondor/example/jakarta.*

scenario_id: "jakarta_flood_legacy"
output_dir: "output/jakarta_flood_legacy"
log_level: "INFO"

disaster:
  name: "Jakarta Flood"
  type: "flood"
  lat: -6.2384
  lon: 106.7918
  severity: 0.7

region:
  type: "bbox"
  bbox: [-6.4000, 106.6000, -6.0800, 106.9800]  # [south, west, north, east]

extraction:
  osm_cache_dir: "data/raw/osm_cache/jakarta"
  use_cached_osm: true
  inarisk_batch_size: 20
  inarisk_rate_limit_s: 1.0
  m2_per_person: 2.0
  default_pop_density: 15000.0   # Jakarta is very dense (~15k/km²)

routing:
  max_routes_per_village: 3
  max_route_risk_threshold: 0.8
  weight_distance:     0.25
  weight_risk:         0.45
  weight_road_quality: 0.20
  weight_time:         0.10
  assignment_method: "greedy"

simulation:
  gama_executable: "gama-headless"
  gaml_model_path: "simulation/models/EvacuationModel.gaml"
  gama_output_dir: "output/simulation/jakarta"
  n_runs: 3
  max_simulation_steps: 500

execution:
  mode: "naive"
  n_workers: 4

# ---- Legacy input (RespondOR v1 format) ----
# Single POI CSV contains both villages (type=village) and shelters (type=shelter/depot/…)
preloaded_poi_csv: "data/examples/jakarta/jakarta_locations.csv"
preloaded_network_pycgr: "data/examples/jakarta/jakarta.pycgrc"
