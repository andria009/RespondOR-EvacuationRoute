# RespondOR-EvacuationRoute — Jakarta Flood Scenario (OSM Input Mode)
# Uses live OSM extraction (osmnx) for the same Jakarta region.
# Pair with jakarta_legacy_input.yaml for input-mode comparison.

scenario_id: "jakarta_flood_osm"
output_dir: "output/jakarta_flood_osm"
log_level: "INFO"

disaster:
  name: "Jakarta Flood"
  type: "flood"
  lat: -6.2384
  lon: 106.7918
  severity: 0.7

region:
  type: "bbox"
  bbox: [-6.4000, 106.6000, -6.0800, 106.9800]  # same bbox as legacy config

extraction:
  osm_cache_dir: "data/raw/osm_cache/jakarta"
  use_cached_osm: true
  network_type: "all"
  village_admin_level: 9
  inarisk_batch_size: 20
  inarisk_rate_limit_s: 1.0
  m2_per_person: 2.0
  default_pop_density: 15000.0

routing:
  max_routes_per_village: 3
  max_route_risk_threshold: 0.8
  weight_distance:     0.25
  weight_risk:         0.45
  weight_road_quality: 0.20
  weight_time:         0.10
  assignment_method: "greedy"

simulation:
  gama_executable: "gama-headless"
  gaml_model_path: "simulation/models/EvacuationModel.gaml"
  gama_output_dir: "output/simulation/jakarta"
  n_runs: 3
  max_simulation_steps: 500

execution:
  mode: "naive"
  n_workers: 4
