# RespondOR — Merapi Benchmark Scenario (OSM Input Mode)
# Uses cached OSM data (no network download if already cached).
# benchmark_village_limit caps routing at N villages for controlled timing.

scenario_id: "merapi_bench_osm"
output_dir: "output/benchmark/merapi_osm"
log_level: "WARNING"
benchmark_village_limit: 500   # route for 500 villages to keep each run ~5-8 min

disaster:
  name: "Merapi Eruption — Benchmark"
  type: "volcano"
  lat: -7.5407
  lon: 110.4457
  severity: 0.8

region:
  type: "circle"
  center: [-7.5407, 110.4457]
  radius_km: 20.0

extraction:
  osm_cache_dir: "data/raw/osm_cache/merapi"
  use_cached_osm: true          # uses existing cache — no new OSM download
  network_type: "all"
  village_admin_level: 9
  inarisk_batch_size: 20
  inarisk_rate_limit_s: 1.0
  m2_per_person: 2.0
  default_pop_density: 800.0

routing:
  max_routes_per_village: 3
  max_route_risk_threshold: 0.8
  weight_distance:     0.25
  weight_risk:         0.45
  weight_road_quality: 0.20
  weight_time:         0.10
  assignment_method: "greedy"

execution:
  mode: "naive"
  n_workers: 4
