# RespondOR-EvacuationRoute — Sukabumi Landslide 2024
# December 2024: simultaneous landslides across Sukabumi and Bogor Regencies
# (West Java) following extreme rainfall. Multiple villages cut off by road
# blockages; dozens killed, thousands displaced.
# This is a highland rural scenario: narrow mountain roads, limited route
# options, settlements isolated by slides → road quality and distance weights
# are critical; many paths may be the only viable escape route.

scenario_id: "sukabumi_landslide_2024"
output_dir: "output/sukabumi_landslide_2024"
log_level: "INFO"

# ------------------------------------------------------------------ #
# DISASTER INFORMATION
# ------------------------------------------------------------------ #
disaster:
  name: "Sukabumi Landslide 2024"
  type: "landslide"              # earthquake|volcano|flood|landslide
  lat: -7.123                    # Cisolok sub-district, worst-affected area
  lon: 106.727
  severity: 0.75

# ------------------------------------------------------------------ #
# REGION OF INTEREST
# ------------------------------------------------------------------ #
region:
  type: "circle"
  center: [-7.123, 106.727]
  radius_km: 18.0                # covers landslide-prone belt from Cisolok to Palabuhanratu

# ------------------------------------------------------------------ #
# DATA EXTRACTION OPTIONS
# ------------------------------------------------------------------ #
extraction:
  use_cached_osm: true
  use_cached_inarisk: true
  network_type: "all"            # include paths — highland villages often only reachable on foot

  # Highland West Java: building clusters on steep slopes give accurate origins;
  # wilayah DB provides L9 kelurahan reference for uncovered areas.
  village_sources: [building_clusters]
  village_pop_density: 600.0     # highland West Java
  village_max_pop: 20000

  # building_clusters — highland West Java: buildings more scattered on slopes
  village_cluster_eps_m: 100
  village_cluster_min_buildings: 1
  village_cluster_max_area_km2: 5.0
  village_fill_uncovered_l9: true
  village_persons_per_dwelling: 2.0
  village_building_persons:
    house:       4.0
    detached:    7.0
    semidetached_house: 4.0
    terrace:     4.0
    residential: 10.0
    farm:        7.0
    "yes":       2.0

  inarisk_batch_size: 20
  inarisk_rate_limit_s: 1.0

  population_csv: null

  # Landslide: puskesmas (clinics) and schools used as shelters; government halls
  shelter_tags:
    amenity:   [hospital, clinic, school, university, community_centre, place_of_worship]
    emergency: [assembly_point, shelter]
    building:  [school, university, civic, government, public, church, mosque]
    leisure:   [sports_centre, stadium, pitch, park]
    landuse:   [military]
  shelter_min_area_m2: 250.0     # include small rural puskesmas
  shelter_m2_per_person: 2.0
  shelter_capacity_csv: null
  shelter_cluster_eps_m: 200
  shelter_cluster_min_shelters: 1

  road_types:
    motorway:      {speed_kmh: 100, capacity_veh_h: 2200}
    trunk:         {speed_kmh:  70, capacity_veh_h: 1800}
    primary:       {speed_kmh:  50, capacity_veh_h: 1600}
    secondary:     {speed_kmh:  40, capacity_veh_h: 1200}
    tertiary:      {speed_kmh:  30, capacity_veh_h:  900}
    unclassified:  {speed_kmh:  25, capacity_veh_h:  600}
    residential:   {speed_kmh:  20, capacity_veh_h:  400}
    service:       {speed_kmh:  15, capacity_veh_h:  200}
    living_street: {speed_kmh:  10, capacity_veh_h:  100}
    track:         {speed_kmh:  10, capacity_veh_h:   80}   # critical in highlands
    path:          {speed_kmh:   6, capacity_veh_h:   30}   # foot-only escape routes
    footway:       {speed_kmh:   4, capacity_veh_h:   30}

# ------------------------------------------------------------------ #
# ROUTING CONFIGURATION
# ------------------------------------------------------------------ #
routing:
  max_routes_per_village: 5
  min_routes_per_village: 3
  max_route_risk_threshold: 0.85  # allow moderately risky routes — limited alternatives

  # Landslide: road quality matters most (unstable slopes), then distance
  weight_distance:     0.30
  weight_risk:         0.40
  weight_road_quality: 0.25       # elevated — avoid degraded mountain roads
  weight_time:         0.05

  bpr_alpha: 0.15
  bpr_beta: 4.0
  assignment_method: "greedy"   # greedy (fast) | lp (optimal)

# ------------------------------------------------------------------ #
# EXECUTION MODE
# ------------------------------------------------------------------ #
execution:
  mode: "parallel"
  n_workers: 4
