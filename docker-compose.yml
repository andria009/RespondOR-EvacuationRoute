services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: respondor_postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: wilayah
      POSTGRES_USER: respondor
      POSTGRES_PASSWORD: respondor
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U respondor -d wilayah"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgis_data:
    name: respondor_postgis_data
